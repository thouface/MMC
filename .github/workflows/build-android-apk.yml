name: Build Android APK
permissions:
  contents: write
  pull-requests: read

on:
  push:
    branches: [main, master, "trae/**"]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  # Android SDK & NDK 版本
  SDK_VERSION: 34
  NDK_VERSION: 27.2.12479018
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  build-android:
    name: Build Android ARM64 APK
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-linux-android
        include:
          - target: aarch64-linux-android
            arch: arm64-v8a

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      # 1. 安装 Java 17（Android 编译必需）
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 2. 安装 Android SDK + NDK
      - name: Install Android SDK & NDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 12.0
          sdk-version: ${{ env.SDK_VERSION }}
          ndk-version: ${{ env.NDK_VERSION }}

      # 写入环境变量，Rust 识别 NDK
      - name: Export NDK Path
        run: |
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/${{ env.NDK_VERSION }}" >> $GITHUB_ENV
          echo "PATH=$ANDROID_HOME/ndk/${{ env.NDK_VERSION }}/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH" >> $GITHUB_PATH

      # 3. 安装 Rust + Android 编译目标
      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # 4. 缓存 Cargo 依赖
      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: linux-android-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      # 5. 缓存编译产物
      - name: Cache build target
        uses: actions/cache@v4
        with:
          path: mmc/mmc-core/target
          key: linux-${{ matrix.target }}-build-${{ hashFiles('mmc/mmc-core/Cargo.toml', 'mmc/mmc-core/Cargo.lock') }}

      # 6. 编译 Rust Android 二进制（根据你的项目目录 mmc/mmc-core）
      - name: Build Rust Android binary
        run: |
          cd mmc/mmc-core
          cargo build --release --bin mmc-android --target ${{ matrix.target }}

      # 7. 打包 APK（如果你使用 cargo-apk / gradle 安卓壳工程）
      ## 场景A：使用 cargo-apk 一键打包（纯Rust安卓项目）
      - name: Install cargo-apk
        run: cargo install cargo-apk

      - name: Generate unsigned APK
        run: |
          cd mmc/mmc-core
          cargo apk build --release --target ${{ matrix.target }}
          mv target/${{ matrix.target }}/release/apk/*.apk mmc-android-${{ matrix.arch }}-unsigned.apk

      ## 场景B：有独立 Android gradle 工程（app/ 目录），取消下面注释使用
      # - name: Build APK via Gradle
      #   run: |
      #     cd android
      #     ./gradlew assembleRelease
      #     mv app/build/outputs/apk/release/app-release-unsigned.apk ../mmc-android-${{ matrix.arch }}-unsigned.apk

      # 8. 上传 APK 制品
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ matrix.arch }}
          path: mmc/mmc-core/mmc-android-*.apk
          if-no-files-found: error

  # Tag推送自动发布APK到Release
  release-apk:
    needs: build-android
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all APK artifacts
        uses: actions/download-artifact@v4
        with:
          path: apk-files
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          generate_release_notes: true
          files: apk-files/*.apk
          name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
