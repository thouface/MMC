name: Build Android APK
permissions:
  contents: write
  pull-requests: read

on:
  push:
    branches: [main, master, "trae/**"]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  SDK_VERSION: 34
  NDK_VERSION: 26.3.11579264
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  build-android:
    name: Build Android ARM64 APK
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-linux-android
        include:
          - target: aarch64-linux-android
            arch: arm64-v8a

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Install Android SDK & NDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 12.0
          sdk-version: ${{ env.SDK_VERSION }}
          ndk-version: ${{ env.NDK_VERSION }}

      - name: Export NDK Path
        run: |
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/${{ env.NDK_VERSION }}" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/${{ env.NDK_VERSION }}" >> $GITHUB_ENV

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --version 2.12.7

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: linux-android-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache build target
        uses: actions/cache@v4
        with:
          path: mmc/mmc-core/target
          key: linux-${{ matrix.target }}-build-${{ hashFiles('mmc/mmc-core/Cargo.toml', 'mmc/mmc-core/Cargo.lock') }}

      # 生成 Kotlin 绑定代码（使用项目本地 uniffi-bindgen crate）
      - name: Generate Kotlin bindings from UDL
        run: |
          cd mmc/mmc-core
          UDL_PATH="crates/mmc-core-uniffi/src/mmc_core.udl"
          KOTLIN_OUT="crates/mmc-core-uniffi/bindings/android/app/src/main/java/com/example/mmc"
          
          # 使用项目本地的 uniffi-bindgen crate 生成 Kotlin 绑定
          cargo run -p uniffi-bindgen -- generate $UDL_PATH --language kotlin --out-dir /tmp/uniffi-output
          
          # 确保输出目录存在
          mkdir -p "$KOTLIN_OUT"
          
          # uniffi 0.29 生成的文件路径是嵌套的：/tmp/uniffi-output/uniffi/mmc_core/mmc_core.kt
          cp /tmp/uniffi-output/uniffi/mmc_core/mmc_core.kt "$KOTLIN_OUT/"
          
          echo "Generated Kotlin bindings"

      # 编译 mmc-core-uniffi Rust库为Android cdylib
      - name: Build Rust Native Library (mmc_core.so)
        run: |
          cd mmc/mmc-core
          cargo ndk -t aarch64-linux-android -p 26 -- build --release -p mmc-core-uniffi

      # 将编译好的 .so 文件复制到 Android 工程的 jniLibs 目录
      - name: Copy Rust Library to Android jniLibs
        run: |
          ANDROID_PROJECT="mmc/mmc-core/crates/mmc-core-uniffi/bindings/android"
          LIB_DIR="$ANDROID_PROJECT/app/src/main/libs/${{ matrix.arch }}"
          mkdir -p "$LIB_DIR"
          cp mmc/mmc-core/target/${{ matrix.target }}/release/libmmc_core.so "$LIB_DIR/"
          echo "Copied libmmc_core.so to $LIB_DIR"

      # 使用 Gradle 构建 APK
      - name: Setup Gradle Wrapper
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.5
          cache-read-only: false

      - name: Build APK via Gradle
        run: |
          cd mmc/mmc-core/crates/mmc-core-uniffi/bindings/android
          gradle assembleRelease --no-daemon

      # 重命名 APK 文件
      - name: Rename APK
        run: |
          APK_PATH="mmc/mmc-core/crates/mmc-core-uniffi/bindings/android/app/build/outputs/apk/release"
          mv "$APK_PATH/app-release-unsigned.apk" "$APK_PATH/mmc-android-${{ matrix.arch }}-unsigned.apk" || true
          mv "$APK_PATH/app-release.apk" "$APK_PATH/mmc-android-${{ matrix.arch }}-unsigned.apk" || true

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ matrix.arch }}
          path: mmc/mmc-core/crates/mmc-core-uniffi/bindings/android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error

  release-apk:
    needs: build-android
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all APK artifacts
        uses: actions/download-artifact@v4
        with:
          path: apk-files
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          generate_release_notes: true
          files: apk-files/*.apk
          name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}