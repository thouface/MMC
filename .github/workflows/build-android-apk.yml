name: Build Android APK
permissions:
  contents: write
  pull-requests: read

on:
  push:
    branches: [main, master, "trae/**"]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name for release (e.g., v1.0.0)'
        required: false
        type: string

env:
  SDK_VERSION: 34
  NDK_VERSION: 26.3.11579264
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  build-android:
    name: Build Android ARM64 APK
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-linux-android
        include:
          - target: aarch64-linux-android
            arch: arm64-v8a

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Install system dependencies (protoc, cmake)
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler cmake
          protoc --version

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Install Android SDK & NDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 12.0
          sdk-version: ${{ env.SDK_VERSION }}
          ndk-version: ${{ env.NDK_VERSION }}

      - name: Setup Android NDK toolchain
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME"
          echo "ANDROID_NDK_ROOT=$ANDROID_NDK_ROOT"

          # 查找实际的 NDK 路径
          if [ -z "$ANDROID_NDK_HOME" ]; then
            echo "ANDROID_NDK_HOME not set, looking for NDK..."
            find "$ANDROID_HOME" -maxdepth 3 -name "clang" -type f 2>/dev/null | head -5
            ls -la "$ANDROID_HOME/ndk/" 2>/dev/null || echo "No ndk dir at $ANDROID_HOME/ndk"
          fi

          NDK_ROOT="${ANDROID_NDK_HOME:-$ANDROID_HOME/ndk/${{ env.NDK_VERSION }}}"
          NDK_TOOLCHAIN="$NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64"
          NDK_BIN="$NDK_TOOLCHAIN/bin"

          echo "Using NDK at: $NDK_ROOT"
          ls "$NDK_BIN/clang" --version 2>&1 || echo "clang not found at $NDK_BIN/clang"

          echo "ANDROID_NDK_ROOT=$NDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$NDK_ROOT" >> $GITHUB_ENV

          # cc crate (ring dependency) looks for CC_<target> with underscores
          echo "CC_aarch64_linux_android=$NDK_BIN/aarch64-linux-android26-clang" >> $GITHUB_ENV
          echo "CXX_aarch64_linux_android=$NDK_BIN/aarch64-linux-android26-clang++" >> $GITHUB_ENV
          echo "AR_aarch64_linux_android=$NDK_BIN/llvm-ar" >> $GITHUB_ENV

          # Cargo linker config
          mkdir -p mmc/mmc-core/.cargo
          cat > mmc/mmc-core/.cargo/config.toml << EOF
          [target.aarch64-linux-android]
          ar = "$NDK_BIN/llvm-ar"
          linker = "$NDK_BIN/aarch64-linux-android26-clang"
          EOF

          echo "NDK toolchain configured"

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: linux-android-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache build target
        uses: actions/cache@v4
        with:
          path: mmc/mmc-core/target
          key: linux-${{ matrix.target }}-build-${{ hashFiles('mmc/mmc-core/Cargo.toml', 'mmc/mmc-core/Cargo.lock') }}

      # 生成 Kotlin 绑定代码（使用项目本地 uniffi-bindgen crate）
      - name: Generate Kotlin bindings from UDL
        run: |
          cd mmc/mmc-core
          UDL_PATH="crates/mmc-core-uniffi/src/mmc_core.udl"
          KOTLIN_OUT="crates/mmc-core-uniffi/bindings/android/app/src/main/java/com/example/mmc"
          BACKUP_OUT="/tmp/uniffi-backup"

          # 使用项目本地的 uniffi-bindgen crate 生成 Kotlin 绑定
          cargo run -p uniffi-bindgen -- generate $UDL_PATH --language kotlin --out-dir /tmp/uniffi-output

          # 备份生成的文件（暂不包含到 Android 项目编译中）
          mkdir -p "$BACKUP_OUT"
          find /tmp/uniffi-output -name "*.kt" -exec cp {} "$BACKUP_OUT/" \;

          echo "Generated Kotlin bindings (backed up to $BACKUP_OUT):"
          ls -la "$BACKUP_OUT/"

      # 编译 mmc-core-uniffi Rust库为Android cdylib
      - name: Build Rust Native Library (mmc_core.so)
        run: |
          cd mmc/mmc-core
          cargo build --release -p mmc-core-uniffi --target aarch64-linux-android

      # 将编译好的 .so 文件复制到 Android 工程的 jniLibs 目录
      - name: Copy Rust Library to Android jniLibs
        run: |
          ANDROID_PROJECT="mmc/mmc-core/crates/mmc-core-uniffi/bindings/android"
          LIB_DIR="$ANDROID_PROJECT/app/src/main/libs/${{ matrix.arch }}"
          mkdir -p "$LIB_DIR"
          cp mmc/mmc-core/target/${{ matrix.target }}/release/libmmc_core.so "$LIB_DIR/"
          echo "Copied libmmc_core.so to $LIB_DIR"

      # 使用 Gradle 构建 APK
      - name: Setup Gradle Wrapper
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.5
          cache-read-only: false

      - name: Build APK via Gradle
        run: |
          cd mmc/mmc-core/crates/mmc-core-uniffi/bindings/android
          gradle assembleRelease --no-daemon

      # 重命名 APK 文件
      - name: Rename APK
        run: |
          APK_PATH="mmc/mmc-core/crates/mmc-core-uniffi/bindings/android/app/build/outputs/apk/release"
          mv "$APK_PATH/app-release-unsigned.apk" "$APK_PATH/mmc-android-${{ matrix.arch }}-unsigned.apk" || true
          mv "$APK_PATH/app-release.apk" "$APK_PATH/mmc-android-${{ matrix.arch }}-unsigned.apk" || true

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ matrix.arch }}
          path: mmc/mmc-core/crates/mmc-core-uniffi/bindings/android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error

  release-apk:
    needs: build-android
    runs-on: ubuntu-latest
    # Only create a release when there's an actual tag (not for regular workflow_dispatch runs)
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all APK artifacts
        uses: actions/download-artifact@v4
        with:
          path: apk-files
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          generate_release_notes: true
          files: apk-files/*.apk
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
