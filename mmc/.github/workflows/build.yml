name: Build Windows Executable

on:
  push:
    branches: [main, master, "trae/**"]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  # Build Windows x86_64 (MSVC)
  build-windows-msvc:
    runs-on: windows-latest
    strategy:
      matrix:
        target:
          - x86_64-pc-windows-msvc
          - x86_64-pc-windows-gnu

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-action@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: mmc-core/target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Build mmc-desktop
        working-directory: mmc-core
        run: |
          cargo build --release --bin mmc-desktop --target ${{ matrix.target }}

      - name: Prepare artifact
        working-directory: mmc-core
        shell: pwsh
        run: |
          $target = "${{ matrix.target }}"
          $arch = if ($target -match "x86_64") { "x64" } else { "x86" }
          $toolchain = if ($target -match "gnu") { "gnu" } else { "msvc" }
          
          $exePath = "target/$target/release/mmc-desktop.exe"
          if (Test-Path $exePath) {
            Copy-Item $exePath "mmc-desktop-$arch-$toolchain.exe"
            
            # Create zip archive
            Compress-Archive -Path "mmc-desktop-$arch-$toolchain.exe" -DestinationPath "mmc-desktop-$arch-$toolchain.zip"
            
            Write-Host "Artifact created: mmc-desktop-$arch-$toolchain.zip"
            dir *.zip
          } else {
            Write-Host "Error: Executable not found at $exePath"
            exit 1
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mmc-desktop-${{ matrix.target }}
          path: mmc-core/*.zip
          if-no-files-found: error

  # Build and create release
  release:
    needs: build-windows-msvc
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          files: |
            artifacts/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
