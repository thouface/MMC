name: mmc
description: 跨品牌、跨协议的多设备控制与文件传输一体化应用。
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.1.4
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3
  uuid: ^4.4.0
  json_annotation: ^4.9.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.1.1
  file_picker: ^8.0.3
  permission_handler: ^11.3.1
  device_info_plus: ^10.1.0
  network_info_plus: ^5.0.3
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.9
  json_serializable: ^6.8.0
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
